<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>main</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <a href="yuraIndex.html"> <button class="mainButton"> let's go </button> </a> 
    <br>

    <script>
        var x = 100;
        document.write("hello" + "<br/>" + x + "<br/>");
        x += 1;
        document.write(x + "<br/>");
        ++x;
        document.write(x +  "<br/>");
        x++;
        document.write(x + "<br/>");

        let num = prompt("10보다 작은 정수를 입력해주세요");
        document.write("<br>");
        document.write("니가 고른 숫자는 "+num+"니까 "+num+"단을 출력하겠다");
        document.write("<br>");    

        for(; num<10; num=num+1){
            for(let j=1; j<10; j=j+1){
                document.write(num*j);
                document.write(" ");
            }
            document.write("<br>");
        }
        document.write("<br>");


        document.write("구구단표 <br>");
        document.write("<table>");
           
            for(let i=2; i<10; i++){
                document.write("<tr>");
                for(let j=1; j<10; j++){
                    document.write("<td>");
                    document.write(i+"x"+j+"="+i*j+"&nbsp;");
                    document.write("</td>");
            }
            document.write("</tr>");            
            }

        document.write("</table>");

        
    </script>

</body>
</html>
